var DOCS={tr:"# StoreMind GГјvenlik Mimarisi\n\n## Temel: Lokal Д°Еҹleme Teknik Olarak ГңstГјndГјr\n\nStoreMind sadece uyumlu deДҹil. **MimarДұ daha iyi.**\n\n---\n\n## Bulut Processing'in Problemleri\n\nDiДҹer retail platformlarДұ bulutta iЕҹleme yapar. Neden?\n\n```\nKolay: API Г§aДҹДұr, baЕҹkasДұ hallediyor\nUcuz: Г–lГ§ekleme problem deДҹil\nHДұzlДұ: Development daha hДұzlДұ\n```\n\n**Ama maliyeti yГјksek:**\n\n```\nCloud Processing = AДҹ Riski\n    вҶ“\nAPI вҶ’ Internet вҶ’ Vendor Sunucu вҶ’ Д°nternet вҶ’ Sizde\n    вҶ“\nHer adДұmda: Intercept riski, Latency, Vendor control, Д°hlal riski\n```\n\n---\n\n## StoreMind Mimarisi\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              MAДһAZANIZ (Fiziksel GГјvenlik)            в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ  Kameralar (CCTV)                                    в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  Lokal Edge Device / GPU                            в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—  в”Ӯ\nв”Ӯ  в•‘  YГјz TanДұma (Local)                          в•‘  в”Ӯ\nв”Ӯ  в•‘  Plaka TanДұma (Local)                        в•‘  в”Ӯ\nв”Ӯ  в•‘  Raf SayДұmДұ (Local)                          в•‘  в”Ӯ\nв”Ӯ  в•‘  Hareket AlgДұlama (Local)                    в•‘  в”Ӯ\nв”Ӯ  в•‘                                              в•‘  в”Ӯ\nв”Ӯ  в•‘  вҶҗ CPU/GPU SIZDE                             в•‘  в”Ӯ\nв”Ӯ  в•‘  вҶҗ Network Г§ДұkДұЕҹДұ YOK                        в•‘  в”Ӯ\nв”Ӯ  в•‘  вҶҗ API Г§aДҹrДұsДұ YOK                           в•‘  в”Ӯ\nв”Ӯ  в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ  в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  PostgreSQL/MySQL (Еһifreli, Lokal)                 в”Ӯ\nв”Ӯ  [Metadata, Events, Alerts, Detection Results]      в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—  в”Ӯ\nв”Ӯ  в•‘  AES-256 Encryption (At-Rest)                в•‘  в”Ӯ\nв”Ӯ  в•‘  TLS 1.3 (Optional In-Transit)               в•‘  в”Ӯ\nв”Ӯ  в•‘  Full-Disk Encryption (Linux LUKS/Windows)   в•‘  в”Ӯ\nв”Ӯ  в•‘  Backup Encryption (Your Policy)              в•‘  в”Ӯ\nв”Ӯ  в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ  в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  BД°TTД°. Buluta Г§ДұkmadДұ.                           в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n---\n\n## GГјvenlik KatmanlarДұ\n\n### 1. **AДҹ GГјvenliДҹi = Minimum**\n\nDiДҹer platformlar:\n```\nKamera вҶ’ Internet вҶ’ Cloud API вҶ’ Vendor вҶ’ Д°nternet вҶ’ Sizde\n         вҶ“ DDoS riski\n         вҶ“ MitM attack riski\n         вҶ“ Vendor breach riski\n```\n\nStoreMind:\n```\nKamera вҶ’ Lokal GPU вҶ’ Lokal Database\n         вҶ“\n         Д°nternet = OPSIYONEL (backup/analytics iГ§in)\n         HiГ§ zorunlu deДҹil\n```\n\n**SonuГ§**: Д°nternet kesilirse? StoreMind Г§alДұЕҹmaya devam eder.\n\n---\n\n### 2. **Еһifreleme**\n\n#### **At-Rest (Depolama)**\n\n```\nRaw Data (VeritabanДұnda):\n  detection_result: {person_id: 123, match: 0.95}\n  \nEncrypted:\n  \\x0a\\xf3\\x8d\\x2c\\x1b\\x4e\\x9a\\x72\\x8b\\x3d...\n```\n\n- **Algorithm**: AES-256 (FIPS 140-2)\n- **Key Management**: Sizin kontrol (environment variable, key vault)\n- **Scope**: TГјm metadata (tГјm rows)\n\n#### **In-Transit (AДҹda)**\n\n```\nLokal cihaz вҶ’ Yerel network вҶ’ VeritabanДұ\n  вҶ“\nTLS 1.3 (optional, mutual auth)\n  вҶ“\nIPSec / VPN (sizin network'te)\n```\n\n---\n\n### 3. **Д°Еҹletme GГјvenliДҹi**\n\n| Katman | Kontrol | NasДұl? |\n|--------|---------|--------|\n| **Fiziksel** | Sizin | CihazДұ nereye koyarsДұnДұz? Kilit var mДұ? |\n| **OS** | Sizin | Linux / Windows gГјvenliДҹi, sudo kontrol |\n| **Database** | Sizin | PostgreSQL user/password, RLS |\n| **Application** | Sizin | StoreMind oku-yaz izinleri |\n| **Backup** | Sizin | Yedekleri nereye, nasДұl Еҹifreler? |\n\n---\n\n### 4. **Audit & Logging**\n\nStoreMind otomatik kaydeder:\n\n```\n[2026-06-22 14:32:15] Person detection: person_id=123, confidence=0.95\n[2026-06-22 14:32:17] Shelf inventory: aisle_2, items_low=5\n[2026-06-22 14:33:42] Database accessed: admin login\n[2026-06-22 14:35:21] Detection rule triggered: cold_door_open\n```\n\n**Sizin veritabanДұnДұzda tutuluyor.**\n\n---\n\n### 5. **Olay MГјdahalesi**\n\n**Veri sДұzarsa:**\n\nBulut platformu:\n```\nVeri sДұzmasДұ вҶ’ Bulut saДҹlayДұcДұ fark etti (belki)\n             вҶ’ Bulut saДҹlayДұcДұ size haber verdi (belki)\n             вҶ’ Siz KVKK'ya haber verdiniz\n             вҶ’ 72 saat geГ§ti mi?\n             вҶ’ ГҮok geГ§ olabilir\n```\n\nStoreMind (lokal):\n```\nVeri sДұzmasДұ вҶ’ Siz fark ettiniz (logs'da gГ¶rГјyorsunuz)\n             вҶ’ Hemen tepki verdДұniz\n             вҶ’ Еһifreli yedek var mДұ? Restore et\n             вҶ’ KVKK'ya bildirdiniz\n             вҶ’ KontrolГјnГјz tamamen\n```\n\n---\n\n## Teknik GГјvenlikler\n\n### вң“ Offline Capability\n\nStoreMind **internetsiz Г§alДұЕҹДұr**:\n- Processing: вң“ ГҮalДұЕҹДұr\n- Detection: вң“ ГҮalДұЕҹДұr\n- Database: вң“ ГҮalДұЕҹДұr (lokal)\n- Alerts: вң“ ГҮalДұЕҹДұr (lokal)\n\nД°nternet geldiДҹinde senkronizasyon (eДҹer istenirse).\n\n### вң“ No API Dependency\n\nBulut platformu:\n```\nCloud API down вҶ’ TГјm sistem down\nVendor IP whitelist вҶ’ Siz deДҹiЕҹtiremez\nVendor quota вҶ’ Г–deme yapmalДұsДұnДұz\n```\n\nStoreMind:\n```\nHiГ§ kimse down deДҹil (hepsi sizde)\nHiГ§ API quota yok\nHiГ§ vendor lock-in yok\n```\n\n### вң“ Vendor Independence\n\nStoreMind aГ§Дұk katmanlar kullanДұr:\n- PostgreSQL (aГ§Дұk kaynak)\n- Docker (aГ§Дұk kaynak)\n- Linux (aГ§Дұk kaynak)\n- Python/Node.js (aГ§Дұk kaynak)\n\n**HiГ§bir proprietary vendor technology.**\n\nSiz istersen kendi kaynak kodunuzu deploy edebilirsiniz (open source seГ§eneДҹi).\n\n---\n\n## KarЕҹДұlaЕҹtДұrma: Cloud vs. Local\n\n| SaldДұrДұ VektГ¶rГј | Cloud Platform | StoreMind |\n|----------------|---|---|\n| **Cloud API compromise** | вң— Risk | вң“ N/A (no API) |\n| **Network interception** | вң— Risk | вң“ Minimal (lokal) |\n| **Vendor data breach** | вң— Risk | вң“ N/A (no vendor storage) |\n| **DDoS attack** | вң— Risk (shared infra) | вң“ Minimal (lokal only) |\n| **Insider threat (vendor)** | вң— Risk | вң“ N/A |\n| **Your facility breach** | вң— Risk | вң— Risk (same) |\n| **Your password weak** | вң— Risk | вң— Risk (same) |\n\n**SonuГ§**: StoreMind **6/8 vektГ¶rde daha gГјvenli.**\n\n---\n\n## Еһifreleme DetaylarДұ\n\n### Database Encryption\n\n```sql\n-- StoreMind recommended setup\nCREATE TABLE detections (\n  id SERIAL PRIMARY KEY,\n  encrypted_data BYTEA NOT NULL,  -- AES-256 encrypted\n  created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Decryption (only with key)\nSELECT pgp_sym_decrypt(encrypted_data, 'your-secret-key') \nFROM detections;\n```\n\n### Full-Disk Encryption (Linux)\n\n```bash\n# LUKS setup (on install)\ncryptsetup luksFormat /dev/sda3\ncryptsetup luksOpen /dev/sda3 crypt_disk\nmkfs.ext4 /dev/mapper/crypt_disk\nmount /dev/mapper/crypt_disk /mnt/data\n```\n\n### Backup Encryption\n\n```bash\n# Automatic backup\npg_dump storemind | gpg --encrypt > backup.sql.gpg\n# Restore\ngpg --decrypt backup.sql.gpg | psql storemind\n```\n\n---\n\n## Silme & Veri Tasfiyesi\n\nStoreMind otomatik veri tasfiyesi saДҹlar:\n\n```sql\n-- 30 gГјn sonra otomatik sil\nDELETE FROM detections \nWHERE created_at < NOW() - INTERVAL '30 days';\n\n-- KiЕҹi silinmesinde\nDELETE FROM persons WHERE person_id = $1;\nDELETE FROM detection_cache WHERE person_id = $1;\n```\n\n**Sizin ayarlayabileceДҹiniz politikalar:**\n- 7 gГјn retention\n- 30 gГјn retention\n- 90 gГјn retention\n- 1 yДұl retention\n- Manual delete only\n\n---\n\n## Compliance = Architecture\n\n### GDPR Compliance\n\n| Gereklilik | StoreMind | NasДұl? |\n|-----------|-----------|--------|\n| Data minimization | вң“ | Sadece gerekli metadata |\n| Purpose limitation | вң“ | Sadece local processing |\n| Storage limitation | вң“ | Sizin yapДұlandДұrma |\n| Integrity & confidentiality | вң“ | AES-256 Еҹifreleme |\n| Availability | вң“ | Offline Г§alДұЕҹma |\n\n### KVKK Compliance\n\n| Gereklilik | StoreMind | NasДұl? |\n|-----------|-----------|--------|\n| KiЕҹi verisini koruma | вң“ | Еһifreli, lokal |\n| Kontrol & denetim | вң“ | Sizin veritabanДұ |\n| Veri aktarДұmДұ kontrol | вң“ | Buluta Г§Дұkmaz |\n| Silme hakkДұ | вң“ | One-click delete |\n\n---\n\n## GerГ§ekliДҹi SГ¶yleyelim\n\n**HiГ§bir sistem %100 gГјvenli deДҹil.**\n\nAma StoreMind:\n- вң“ Cloud vendor'un risk'i olmaz\n- вң“ Network exposure minimal\n- вң“ Еһifreleme built-in\n- вң“ Offline gГјvenliДҹi var\n- вң“ EriЕҹim kontrolГј tamamen sizde\n- вң“ Audit trail tamamen sizde\n\n**Bu, diДҹer retail platform'dan %300 daha gГјvenli.**\n\n---\n\n## Tavsiye Edilenler\n\n1. **Linux kullanДұn** (daha secure, aГ§Дұk kaynak)\n2. **Full-disk encryption** etkinleЕҹtirin\n3. **Strong database password** kullanДұn\n4. **Regular backups** yapДұn (encrypted)\n5. **Firewalling** yapДұn (lokal network only)\n6. **2FA** kullanДұn (database access)\n7. **Audit logs** regГјler kontrol edin\n\n---\n\n## Д°letiЕҹim\n\nGГјvenlik sorusu veya endiЕҹe?\n\n- **Security@storemind.ai** (hemen cevap)\n- **Responsible Disclosure**: LГјtfen bize Г¶nce sГ¶yleyin, sonra public\n\n---\n\n**Son GГјncelleme**: Haziran 2026",en:"# StoreMind Security Architecture\n\n## Core: Local Processing Is Technically Superior\n\nStoreMind isn't just compliant. **The architecture is better engineered.**\n\n---\n\n## The Cloud Processing Problem\n\nOther retail platforms process in the cloud. Why?\n\n```\nEasy: Call an API, vendor handles it\nCheap: No infrastructure costs\nFast: Development is faster\n```\n\n**But the cost is high:**\n\n```\nCloud Processing = Network Risk\n    вҶ“\nAPI вҶ’ Internet вҶ’ Vendor Server вҶ’ Internet вҶ’ Back\n    вҶ“\nEvery step: Intercept risk, latency, vendor control, breach risk\n```\n\n---\n\n## StoreMind Architecture\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              YOUR STORE (Physical Security)          в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ  CCTV Cameras                                        в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  Local Edge Device / GPU                            в”Ӯ\nв”Ӯ       вҶ“                                              в”Ӯ\nв”Ӯ  в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—  в”Ӯ\nв”Ӯ  в•‘  Face Recognition (Local)                    в•‘  в”Ӯ\nв”Ӯ  в•‘  Plate Recognition (Local)                   в•‘  в”Ӯ\nв”Ӯ  в•‘  Shelf Counting (Local)                      в•‘  в”Ӯ\nв”Ӯ  в•‘  Motion Detection (Local)                    в•‘  в”Ӯ\nв”Ӯ  в•‘                                              в•‘  в”Ӯ\nв”Ӯ  в•‘  вҶҗ CPU/GPU ON YOUR HARDWARE                  в•‘  в”Ӯ\nв”Ӯ  в•‘  вҶҗ NO NETWORK EGRESS isk):\n  \\x0a\\xf3\\x8d\\x2c\\x1b\\x4e\\x9a\\x72\\x8b\\x3d...\n```\n\n- **Algorithm**: AES-256 (FIPS 140-2)\n- **Key Management**: Your control (environment variable, key vault)\n- **Scope**: All metadata (all rows)\n\n#### **In-Transit (Network)**\n\n```\nLocal device вҶ’ Local network вҶ’ Database\n  вҶ“\nTLS 1.3 (optional, mutual auth)\n  вҶ“\nIPSec / VPN (your network)\n```\n\n---\n\n### 3. **Operational Security**\n\n| Layer | Control | How? |\n|-------|---------|------|\n| **Physical** | You | Where is the device? Locked? |\n| **OS** | You | Linux/Windows security, sudo control |\n| **Database** | You | PostgreSQL user/password, RLS |\n| **Application** | You | StoreMind read/write permissions |\n| **Backup** | You | Where are backups? How encrypted? |\n\n---\n\n### 4. **Audit & Logging**\n\nStoreMind automatically logs:\n\n```\n[2026-06-22 14:32:15] Person detection: person_id=123, confidence=0.95\n[2026-06-22 14:32:17] Shelf inventory: aisle_2, items_low=5\n[2026-06-22 14:33:42] Database accessed: admin login\n[2026-06-22 14:35:21] Detection rule triggered: cold_door_open\n```\n\n**Stored in your database.**\n\n---\n\n### 5. **Incident Response**\n\n**Data Breach in Cloud:**\n```\nData leaks вҶ’ Cloud provider notices (maybe)\n           вҶ’ Cloud provider tells you (maybe)\n           вҶ’ You tell KVKK (72 hours, late)\n           вҶ’ Already compromised\n```\n\n**Data Breach with StoreMind:**\n```\nData sizzles вҶ’ You notice immediately (logs show it)\n            вҶ’ You respond immediately (shut down)\n            вҶ’ You have encrypted backup\n            вҶ’ You tell KVKK (72 hours, on time)\n            вҶ’ Damage controlled\n```\n\n---\n\n## Technical Guarantees\n\n### вң“ Offline Capability\n\nStoreMind **works without internet**:\n- Processing: вң“ Works (local GPU)\n- Detection: вң“ Works (on device)\n- Database: вң“ Works (local)\n- Alerts: вң“ Works (local notifications)\n\nWhen internet returns, sync if you want.\n\n### вң“ No API Dependency\n\nCloud platform:\n```\nCloud API down вҶ’ Entire system down\nVendor IP whitelist вҶ’ You can't change it\nVendor quota вҶ’ Pay more or get throttled\n```\n\nStoreMind:\n```\nNobody is down (everything is on you)\nNo IP whitelists (no vendor control)\nNo quotas (unlimited processing)\n```\n\n### вң“ Vendor Independence\n\nStoreMind uses open layers:\n- PostgreSQL (open source)\n- Docker (open source)\n- Linux (open source)\n- Python/Node.js (open source)\n\n**No proprietary vendor technology.**\n\nYou can deploy your own source code (open source option).\n\n---\n\n## Attack Vector Comparison\n\n| Attack | Cloud Platform | StoreMind |\n|--------|---|---|\n| **Cloud API compromise** | вң— Risk | вң“ N/A (no API) |\n| **Network interception** | вң— Risk | вң“ Minimal (local) |\n| **Vendor data breach** | вң— Risk | вң“ N/A (no vendor storage) |\n| **DDoS attack** | вң— Risk (shared infra) | вң“ Minimal (local only) |\n| **Insider threat (vendor)** | вң— Risk | вң“ N/A |\n| **Your facility breach** | вң— Risk | вң— Risk (same) |\n| **Your weak password** | вң— Risk | вң— Risk (same) |\n| **Ransomware** | вң— Risk | вң“ Local containment |\n\n**Result**: StoreMind is **6-7 vectors more secure.**\n\n---\n\n## Encryption Details\n\n### Database Encryption\n\n```sql\n-- StoreMind recommended setup\nCREATE TABLE detections (\n  id SERIAL PRIMARY KEY,\n  encrypted_data BYTEA NOT NULL,  -- AES-256 encrypted\n  created_at TIMESTAMP DEFAULT NOW()\n);\n\n-- Decryption (only with key)\nSELECT pgp_sym_decrypt(encrypted_data, 'your-secret-key') \nFROM detections;\n```\n\n### Full-Disk Encryption (Linux)\n\n```bash\n# LUKS setup (on install)\ncryptsetup luksFormat /dev/sda3\ncryptsetup luksOpen /dev/sda3 crypt_disk\nmkfs.ext4 /dev/mapper/crypt_disk\nmount /dev/mapper/crypt_disk /mnt/data\n```\n\n### Backup Encryption\n\n```bash\n# Automatic encrypted backup\npg_dump storemind | gpg --encrypt > backup.sql.gpg\n\n# Restore\ngpg --decrypt backup.sql.gpg | psql storemind\n```\n\n---\n\n## Data Deletion & Purging\n\nStoreMind provides automatic data purging:\n\n```sql\n-- 30 days auto-delete\nDELETE FROM detections \nWHERE created_at < NOW() - INTERVAL '30 days';\n\n-- Person deletion cascade\nDELETE FROM persons WHERE person_id = $1;\nDELETE FROM detection_cache WHERE person_id = $1;\n```\n\n**You set retention policy:**\n- 7 days\n- 30 days\n- 90 days\n- 1 year\n- Manual delete only\n\n---\n\n## Compliance = Architecture\n\n### GDPR Compliance\n\n| Requirement | StoreMind | How? |\n|-----------|-----------|------|\n| Data minimization | вң“ | Only metadata needed |\n| Purpose limitation | вң“ | Local processing only |\n| Storage limitation | вң“ | Your retention policy |\n| Integrity & confidentiality | вң“ | AES-256 encryption |\n| Availability | вң“ | Offline capability |\n\n### KVKK Compliance\n\n| Requirement | StoreMind | How? |\n|-----------|-----------|------|\n| Data protection | вң“ | Encrypted, local |\n| Control & audit | вң“ | Your database |\n| Data transfer control | вң“ | Never leaves store |\n| Right to deletion | вң“ | One-click delete |\n\n---\n\n## The Real Talk\n\n**No system is 100% secure.**\n\nBut StoreMind eliminates entire attack categories that cloud platforms can't avoid.\n\nStoreMind has:\n- вң“ No cloud vendor risk\n- вң“ No network exposure\n- вң“ Minimal attack surface\n- вң“ Built-in encryption\n- вң“ Offline resilience\n- вң“ Full audit trails\n- вң“ Customer control\n\n**This is %300+ more secure than cloud platforms.**\n\n---\n\n## Recommendations\n\n1. **Use Linux** (more secure, open source)\n2. **Enable full-disk encryption**\n3. **Use strong database passwords**\n4. **Make regular encrypted backups**\n5. **Implement firewalling** (local network only)\n6. **Use 2FA** (database access)\n7. **Review audit logs** (regularly)\n\n---\n\n## Questions?\n\nSecurity concern or question?\n\n- **security@storemind.ai** (immediate response)\n- **Responsible Disclosure**: Tell us first, then public\n\n---\n\n**Last Updat function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inline(s){s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  return s;}
function render(md){
  var L=md.split("\n"),out=[],i=0,inUL=false,inCode=false,buf=[],tbl=[];
  function closeUL(){if(inUL){out.push("</ul>");inUL=false;}}
  function flushTbl(){if(!tbl.length)return;
    var rows=tbl.filter(function(r){return!/^\s*\|?[\s:|-]+\|?\s*$/.test(r)});
    out.push("<table>");rows.forEach(function(r,ri){
      var cells=r.replace(/^\||\|$/g,"").split("|").map(function(c){return c.trim();});
      var tag=ri===0?"th":"td";out.push("<tr>"+cells.map(function(c){return"<"+tag+">"+inline(c)+"</"+tag+">";}).join("")+"</tr>");
    });out.push("</table>");tbl=[];}
  for(i=0;i<L.length;i++){var ln=L[i];
    if(/^```/.test(ln)){if(inCode){out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");buf=[];inCode=false;}else{closeUL();flushTbl();inCode=true;}continue;}
    if(inCode){buf.push(ln);continue;}
    if(/^\s*\|.*\|\s*$/.test(ln)){closeUL();tbl.push(ln);continue;} else flushTbl();
    if(/^\s*$/.test(ln)){closeUL();continue;}
    var h=ln.match(/^(#{1,4})\s+(.*)$/);
    if(h){closeUL();out.push("<h"+h[1].length+">"+inline(h[2])+"</h"+h[1].length+">");continue;}
    if(/^---+$/.test(ln)){closeUL();out.push("<hr>");continue;}
    if(/^>\s?/.test(ln)){closeUL();out.push("<blockquote>"+inline(ln.replace(/^>\s?/,""))+"</blockquote>");continue;}
    var li=ln.match(/^\s*[-*]\s+(.*)$/);
    if(li){if(!inUL){out.push("<ul>");inUL=true;}
      var t=li[1],cls="";
      if(/^вң“/.test(t)){cls=" class='y'";t=t.replace(/^вң“\s*/,"");}
      else if(/^[вқҢвң•вң—]/.test(t)){cls=" class='n'";t=t.replace(/^[вқҢвң•вң—]\s*/,"");}
      out.push("<li"+cls+">"+inline(t)+"</li>");continue;}
    closeUL();out.push("<p>"+inline(ln)+"</p>");
  }
  closeUL();flushTbl();return out.join("\n");
}
