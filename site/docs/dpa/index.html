var DOCS={tr:"# Veri İşleme Sözleşmesi (DPA)\n## StoreMind\n\n**Yürürlük Tarihi**: Haziran 2026  \n**Geçerliliği**: GDPR (AB), KVKK (Türkiye), Global\n\n---\n\n## 1. Tanımlar\n\n**StoreMind** (\"Processor\" / \"İşleyici\"):\n- Yazılım sağlayıcı, lokal processing platform'u sağlar\n- Sunucu işletmiyor, veri depolamıyor, bulut hizmeti vermiyor\n\n**Müşteri** (\"Controller\" / \"Denetleyen\"):\n- StoreMind'ı kullanan şirket (mağaza, market, perakende)\n- Veri işleme kararını veren taraf\n- Yasal sorumluluğu taşıyan taraf\n\n**Kişisel Veri** (\"Personal Data\"):\n- Yüz özellikleri (face vectors)\n- Deteksiyon sonuçları (person_id, confidence scores)\n- Araç plakası bilgisi\n- İş logları (timestamp, location, event)\n\n**İşleme** (\"Processing\"):\n- Yüz algılama, matching, eşleştirme\n- Metadata oluşturması\n- Lokal veritabanı yazma\n- Şifreleme, silme\n\n---\n\n## 2. Tarafların Rolleri\n\n### 2.1 StoreMind (Veri İşleyici)\n\nStoreMind sadece şu yapıyor:\n\n✓ Lokal processing framework sağlar  \n✓ Şifreleme altyapısı sunar  \n✓ Silme & audit mekanizmaları sağlar  \n✓ Teknik dokumentasyon verir  \n\nStoreMind **şunu yapmıyor:**\n\n❌ Veri saklamaz (cloud'da)  \n❌ Veri toplamazv (telemetry)  \n❌ Veri analiz etmez (vendor analitiği)  \n❌ Veri satmaz  \n❌ Veri paylaşmaz  \n❌ Veri yedeklemez  \n❌ Veri transfer etmez  \n\n### 2.2 Müşteri (Veri Denetleyeni)\n\nMüşteri sorumluluk taşıyor:\n\n✓ Kararı veriyor (hangi kamera, hangi algorithm)  \n✓ Rızayı alıyor (çalışan, müşteri onayı)  \n✓ Veritabanını yönetiyor (backup, restore, şifre)  \n✓ Erişim kontrolü yapıyor (kim görebilir)  \n✓ Silme işlemi yapıyor (istek gelince silebiliyor)  \n✓ GDPR/KVKK bildirimi yapıyor (72 saat)  \n✓ DPO atama yapıyor (gerekiyorsa)  \n✓ Güvenlik denetimi yapıyor  \n\n---\n\n## 3. Veri İşleme Kapsamı\n\n### 3.1 İşlenen Veriler\n\n| Veri Türü | Nerede | Kimlerin |\n|-----------|--------|---------|\n| **Yüz Özellikleri** | Lokal GPU/cihaz | Geçici (RAM) |\n| **Detection Results** | Lokal database | Daimi (encrypted) |\n| **Metadata** | Lokal database | Daimi (encrypted) |\n| **Event Logs** | Lokal database | Daimi (encrypted) |\n| **Person Master List** | Lokal database | Daimi (encrypted) |\n\n### 3.2 İşleme Yöntemi\n\n**Hiçbir zaman:**\n- ❌ İnternet üzerinden gönderilmez\n- ❌ Bulut API'sine verilmez\n- ❌ 3. taraf servisi kullanılmaz\n- ❌ Vendor sunucularına depolanmaz\n\n**Her zaman:**\n- ✓ Lokal işleme\n- ✓ Lokal storage (encrypted)\n- ✓ Offline capability\n- ✓ Müşteri control\n\n### 3.3 İşleme Süresi\n\n**Tanımsız** — müşteri siler veya \"retention policy\"'de yazılı süre.\n\nVarsayılan:\n- 30 gün otomatik silme (ayarlanabilir)\n- Manuel silme (müşteri talep eder)\n\n---\n\n## 4. StoreMind'ın Garantileri\n\n### 4.1 Teknik Garantiler\n\n✓ **Lokal Processing**: Tüm ML/AI = sizin cihazda  \n✓ **Şifreli Storage**: AES-256 (FIPS 140-2)  \n✓ **No API Calls**: Bulut dependency yok  \n✓ **Offline Capable**: İnternet kesilse çalışır  \n✓ **Audit Logs**: İşleme kayıtları saklanır  \n✓ **Deletion Capable**: Verileri siler/export'lar  \n✓ **Open Framework**: Açık kaynak components  \n\n### 4.2 Operasyon Garantileri\n\nStoreMind aşağıdakileri sağlar:\n\n✓ Düzenli Security Updates (if applicable)  \n✓ Documentation & Training  \n✓ Technical Support (for processing framework)  \n✓ Audit Trail Mechanisms  \n\n---\n\n## 5. Müşterinin Yükümlülükleri\n\n### 5.1 Yasal Uyumluluk\n\nMüşteri garanti eder:\n\n```\n1. \"Kişisel verileri işlemek için yasal zemine sahibim\"\n   → Rıza belgesi, yasal dayanak, işletme sahibi hakkı\n   \n2. \"Bilgilendirilmiş rıza aldım veya yasalar kapsamındayım\"\n   → İşyeri CCTV = hakkı var, ama yüz tanıma = rıza gerekli\n   \n3. \"Veri sahibilerine bilgi verdim\"\n   → Privacy notice gösterdim, uyarı levhası koydım\n   \n4. \"Veri tasfiyesi ve saklama politikam var\"\n   → Ne kadar tutuluyor, kim görüyor, nasıl silinir\n```\n\n### 5.2 Teknik Uyumluğu\n\nMüşteri sorumluluk taşıyor:\n\n```\n1. Şifreleme anahtarını güvenli tutar\n   → Storage'da, environment var'da, keysafe'de\n   \n2. Veritabanı şifresini güvenli tutar\n   → Strong password, 2FA, regular rotation\n   \n3. Erişim kontrolü yapar\n   → Kim lokal database'e bağlanabiliyor?\n   \n4. Backups'ı şifreli tutarv\n   → Yedekler de şifreli olmalı\n   \n5. Full-disk encryption'ı etkinleştirir\n   → Linux LUKS, Windows BitLocker, etc.\n```\n\n### 5.3 İhlal Halinde Tepki\n\nMüşteri şunları yapmalı:\n\n```\nVeri Sızması / Breach:\n  ↓\n1. Hemen tespit et (audit logs'ta görüyorsun)\n  ↓\n2. Hemen kontrol et (ne kadar veri sızmasını?)\n  ↓\n3. Hemen tepki ver (sistem restart, erişim kapat)\n  ↓\n4. 72 saat içinde KVKK'ya / Regülatore bildır\n  ↓\n5. Veri sahiplerine haber ver (gerekiyorsa)\n  ↓\n6. Soruşturma başlat (lokal, StoreMind'a değil)\n\nNOT: StoreMind'ın hiçbir yükümlülüğü yok (veri tutmadığı için)\n```\n\n---\n\n## 6. Sorumluluk Sınırları\n\n### 6.1 StoreMind Sorumlu DEĞİLDİR\n\nStoreMind sorumlu olmadığı durumlar:\n\n❌ Müşteri yazılı rıza almadığı halde yüz tanıma yaptığı  \n❌ Müşteri veritabanı şifresini kaybettiği  \n❌ Müşteri backup'ı şifreli yapmadığı  \n❌ Müşteri cihazı fiziksel olarak çaldığı  \n❌ Müşteri access control'ü doğru yapmaması  \n❌ Müşteri silme talebini yönetememesi  \n❌ Müşteri GDPR/KVKK bildirimi yapmaması  \n❌ Müşteri regülasyon kontrol defteri tutmaması  \n\n**Sonuç**: StoreMind hiçbir yasal risk taşımaz (lokal processing sayesinde)\n\n### 6.2 Müşteri Sorumlu\n\nMüşteri sorumlu:\n\n✓ Tüm yasal uyumluluğu (GDPR/KVKK)  \n✓ Tüm teknik güvenliği (cihaz, database, şifre)  \n✓ Tüm erişim kontrolü (kim görebilir)  \n✓ Tüm veri tasfiyesi (silme, retention)  \n✓ Tüm incident response (breach, bildiriler)  \n✓ Tüm audit trail (logları tutma)  \n\n---\n\n## 7. Veri Taşıyıcı Anlaşması\n\n### 7.1 Veri Transferi\n\nStoreMind:\n- ❌ Hiçbir zaman veri transfer etmez (cloud'a)\n- ✓ Müşteri isterse veri export'ları (CSV/JSON)\n- ✓ Müşteri isterse cloud'a gönderebilir (kendi sorumluluğu)\n\n### 7.2 Opsiyonel Bulut Entegrasyonu\n\nEğer müşteri cloud bağlarsa (Supabase, AWS, etc.):\n\n**StoreMind'ın yapacağı:**\n- Veri export mekanizması sağlar\n- Entegrasyon dokümantasyonu sağlar\n\n**Müşterinin yapacağı:**\n- Cloud servisi seçer\n- Cloud servisle kendi DPA yapar (StoreMind değil)\n- Cloud servisten taahhüt alır\n\n**StoreMind sorumluluğu: SIFIR**\n\n---\n\n## 8. Siber Güvenlik\n\n### 8.1 StoreMind'ın Kontrolleri\n\nStoreMind framework sağlar:\n\n✓ Şifreleme (AES-256)  \n✓ Audit logging  \n✓ Offline operation  \n✓ No external API  \n✓ Deletion mechanisms  \n\n### 8.2 Müşterinin Kontrolleri\n\nMüşteri implement eder:\n\n✓ Full-disk encryption  \n✓ Network segmentation  \n✓ Access logging  \n✓ Intrusion detection  \n✓ Firewall rules  \n✓ Regular updates  \n\n---\n\n## 9. Uyumluğu İzleme\n\n### 9.1 StoreMind Tarafında\n\nStoreMind şunu **yapmaz**:\n- Müşteri veritabanını denetlemez\n- Müşteri erişim kontrolünü kontrol etmez\n- Müşteri compliance'ını auditlemiez\n- Müşteri loglarını toplamasına\n\nStoreMind şunu **yapabilir**:\n- Teknik destek vermek\n- Uyumluluk checklist'i sağlamak\n- Best practice rehberi vermek\n\n### 9.2 Müşteri Tarafında\n\nMüşteri sorumlu:\n\n✓ Reguler internal audit (GDPR/KVKK)  \n✓ Penetration testing (emziyetik)  \n✓ Access control review (3 ayda 1)  \n✓ Incident response plan (yazılı)  \n✓ Staff training (yılda 1)  \n\n---\n\n## 10. Sorumluluk & Tazminat\n\n### 10.1 Sınırlı Sorumluluk\n\nStoreMind **hiçbir sebeple sorumlu değil:**\n\n```\n1. Müşteri veri işlemeyi kötüye kullanması\n2. Müşteri yasal rıza almayı unutması\n3. Müşteri şifreleme anahtarını kaybetmesi\n4. Müşteri cihaz güvenliğini ihmal etmesi\n5. Müşteri GDPR/KVKK bildirimi yapmaması\n6. Müşteri DPO atamaması\n7. Müşteri incident response'ı yönetememesi\n```\n\n**Neden?** StoreMind veri tutmadığı için, sorumluluk yoktur.\n\n### 10.2 İstisnalar\n\nStoreMind sorumlu OLUR (nadir):\n\n```\nSADECE eğer:\n- StoreMind yazılımı intentionally veri buluta gönderirse\n- StoreMind intentionally telemetry toplayıp veri satarsa\n- StoreMind intentional backdoor açarsa\n- StoreMind intentional encryption keyi çalması\n\n(Bunlar hiçbir zaman olmayacak, code review'de gözüktüğü için)\n```\n\n---\n\n## 11. İmlai & Fesih\n\n### 11.1 DPA Geçerliliği\n\nBu DPA:\n- StoreMind'ı kullanmaya başladığında yürürlüğe girer\n- StoreMind'ı kullanmayı bırakıncaya kadar devam eder\n- Başka yazılı anlaşma yoksa bu geçerlidir\n\n### 11.2 Sona Erme\n\nMüşteri StoreMind'ı kullanmayı bırakınca:\n\n```\n1. Tüm veri müşteriye ait (CSV, JSON export)\n2. StoreMind veri tutmaz (hiç tutmadı)\n3. Müşteri veriyi silebilir / transfer edebilir\n4. DPA otomatik fesih olur\n```\n\n---\n\n## 12. Ek Sorumluluklar\n\n### 12.1 Kişi Hakları\n\n**Erişim Talep (Subject Access Request)**\n\n```\nKişi: \"Benim verilerim neler?\"\nMüşteri: Veritabanından query → export et → ver\nStoreMind: Destek sağlar (teknik rehberlik)\n```\n\n**Silme Talep (Right to Erasure)**\n\n```\nKişi: \"Sil beni\"\nMüşteri: Veritabanından DELETE → execute → doğrula\nStoreMind: Deletion tool'ları sağlar\n```\n\n**İhraz Talep (Data Portability)**\n\n```\nKişi: \"Verilerimde export et\"\nMüşteri: CSV/JSON export → Müşteriye ver\nStoreMind: Export mekanizmaları sağlar\n```\n\n### 12.2 Düzeltme Talep (Rectification)\n\n```\nKişi: \"Verilerim yanlış\"\nMüşteri: Veritabanında update yapabilir\nStoreMind: Audit trail'de görünür (ki değişiklik takip edilsin)\n```\n\n---\n\n## 13. İmza & Kabul\n\nBu DPA'yı kullanarak StoreMind yazılımını indiren veya kullanan müşteri:\n\n```\n☑ Tüm yükümlülükleri anlamıştır\n☑ Tüm sorumluluğu kabul etmiştir\n☑ GDPR/KVKK uyumluluğu kendisinin olduğunu anlamıştır\n☑ StoreMind'ın hiçbir veri tutmadığını anlamıştır\n☑ Teknik desteği talep edebileceğini anlamıştır\n```\n\n---\n\n## 14. İletişim\n\nDPA hakkında soru?\n\n- **dpa@storemind.ai**\n- **legal@storemind.ai**\n- **compliance@storemind.ai**\n\n---\n\n**Son Güncelleme**: Haziran 2026  \n**Versiyon**: 1.0  \n**Status**: Yürürlükte",en:"# Data Processing Agreement (DPA)\n## StoreMind\n\n**Effective Date**: June 2026  \n**Jurisdiction**: GDPR (EU), KVKK (Turkey), Global\n\n---\n\n## 1. Definitions\n\n**StoreMind** (\"Processor\"):\n- Software provider, supplies local processing platform\n- Does NOT operate servers, store data, or provide cloud services\n\n**Customer** (\"Controller\"):\n- Company using StoreMind (retail store, market)\n- Makes data processing decisions\n- Bears full legal responsibility\n\n**Personal Data**:\n- Face features (face vectors)\n- Detection results (person_id, confidence scores)\n- Vehicle plate information\n- Event logs (timestamp, location, event)\n\n**Processing**:\n- Face detection, matching\n- Metadata creation\n- Local database writing\n- Encryption, deletion\n\n---\n\n## 2. Parties' Roles\n\n### 2.1 StoreMind (Processor)\n\nStoreMind **does only**:\n\n✓ Supplies local processing framework  \n✓ Provides encryption infrastructure  \n✓ Supplies deletion & audit mechanisms  \n✓ Provides technical documentation  \n\nStoreMind **does NOT do**:\n\n❌ Store data (cloud)  \n❌ Collect telemetry  \n❌ Analyze data (vendor analytics)  \n❌ Sell data  \n❌ Share data  \n❌ Back up data  \n❌ Transfer data  \n\n### 2.2 Customer (Controller)\n\nCustomer bears responsibility:\n\n✓ Makes processing decisions (which cameras, algorithms)  \n✓ Obtains consent (employee, customer approval)  \n✓ Manages database (backup, restore, password)  \n✓ Controls access (who can view)  \n✓ Executes deletion (on request)  \n✓ Reports breaches (72 hours to regulator)  \n✓ Appoints DPO (if required)  \n✓ Conducts security audits  \n\n---\n\n## 3. Scope of Data Processing\n\n### 3.1 Data Types Processed\n\n| Data Type | Location | Duration |\n|-----------|----------|----------|\n| **Face Features** | Local device | Temporary (RAM) |\n| **Detection Results** | Local database | Permanent (encrypted) |\n| **Metadata** | Local database | Permanent (encrypted) |\n| **Event Logs** | Local database | Permanent (encrypted) |\n| **Person Master List** | Local database | Permanent (encrypted) |\n\n### 3.2 Processing Method\n\n**Never:**\n- ❌ Transferred via internet\n- ❌ Sent to cloud API\n- ❌ Uses third-party service\n- ❌ Stored on vendor servers\n\n**Always:**\n- ✓ Local processing\n- ✓ Local encrypted storage\n- ✓ Offline capable\n- ✓ Customer controlled\n\n### 3.3 Processing Duration\n\n**Undefined** — Customer deletes OR per \"retention policy\" in contract.\n\nDefault:\n- 30-day auto-delete (configurable)\n- Manual delete on request\n\n---\n\n## 4. StoreMind's Guarantees\n\n### 4.1 Technical Guarantees\n\n✓ **Local Processing**: All ML/AI on your device  \n✓ **Encrypted Storage**: AES-256 (FIPS 140-2)  \n✓ **No API Calls**: No cloud dependency  \n✓ **Offline Operation**: Works without internet  \n✓ **Audit Logs**: Processing trails maintained  \n✓ **Deletion Capable**: Data can be deleted/exported  \n✓ **Open Framework**: Open source components  \n\n### 4.2 Operational Guarantees\n\nStoreMind provides:\n\n✓ Regular security updates (if applicable)  \n✓ Documentation & training  \n✓ Technical support (for processing framework)  \n✓ Audit trail mechanisms  \n\n---\n\n## 5. Customer Obligations\n\n### 5.1 Legal Compliance\n\nCustomer guarantees:\n\n```\n1. \"I have legal basis to process this personal data\"\n   → Consent document, legal authority, or ownership right\n   \n2. \"I obtained informed consent OR I'm within legal scope\"\n   → Workplace CCTV = right to process, but face recognition = separate consent\n   \n3. \"I informed data subjects\"\n   → Posted privacy notice, installed warning sign\n   \n4. \"I have data retention & deletion policy\"\n   → How long kept, who accesses, how deleted\n```\n\n### 5.2 Technical Compliance\n\nCustomer responsible for:\n\n```\n1. Protect encryption keys\n   → Environment variable, key vault, secure storage\n   \n2. Protect database password\n   → Strong password, 2FA, regular rotation\n   \n3. Implement access control\n   → Who can access the local database?\n   \n4. Encrypt backups\n   → Backups must also be encrypted\n   \n5. Enable full-disk encryption\n   → Linux LUKS, Windows BitLocker, etc.\n```\n\n### 5.3 Breach Response\n\nCustomer must:\n\n```\nData Breach / Leak:\n  ↓\n1. Detect immediately (audit logs show it)\n  ↓\n2. Assess impact (how much data leaked?)\n  ↓\n3. Respond immediately (shut down, restore)\n  ↓\n4. Notify regulator within 72 hours (KVKK / GDPR)\n  ↓\n5. Notify affected parties (if required)\n  ↓\n6. Investigate locally (not StoreMind's responsibility)\n\nNote: StoreMind has zero obligation \n(we never stored or transferred data)\n```\n\n---\n\n## 6. Limitation of Liability\n\n### 6.1 StoreMind NOT Liable For\n\n❌ Customer obtained no written consent before using face recognition  \n❌ Customer lost database password  \n❌ Customer didn't encrypt backups  \n❌ Customer device was physically stolen  \n❌ Customer didn't set up access control  \n❌ Customer didn't respond to deletion requests  \n❌ Customer didn't report GDPR/KVKK breach in 72 hours  \n❌ Customer didn't maintain compliance records  \n\n**Result**: StoreMind carries ZERO legal risk (local processing = no liability)\n\n### 6.2 Customer IS Liable\n\nCustomer responsible for:\n\n✓ All GDPR/KVKK compliance  \n✓ All technical security  \n✓ All access control  \n✓ All data purging  \n✓ All incident response  \n✓ All regulatory reporting  \n\n---\n\n## 7. Data Transfer Agreement\n\n### 7.1 Data Transfer Policy\n\nStoreMind:\n- ❌ Never transfers data (cloud)\n- ✓ Exports data on request (CSV/JSON)\n- ✓ Customer can transfer to cloud (own responsibility)\n\n### 7.2 Optional Cloud Integration\n\nIf customer connects cloud (Supabase, AWS, etc.):\n\n**StoreMind's role:**\n- Provides data export mechanism\n- Provides integration documentation\n\n**Customer's role:**\n- Chooses cloud service\n- Signs separate DPA with cloud provider (not StoreMind)\n- Takes responsibility for cloud compliance\n\n**StoreMind's liability:** ZERO\n\n---\n\n## 8. Cybersecurity\n\n### 8.1 StoreMind Controls\n\nStoreMind framework provides:\n\n✓ Encryption (AES-256)  \n✓ Audit logging  \n✓ Offline operation  \n✓ No external APIs  \n✓ Deletion mechanisms  \n\n### 8.2 Customer Controls\n\nCustomer implements:\n\n✓ Full-disk encryption  \n✓ Network segmentation  \n✓ Access logging  \n✓ Intrusion detection  \n✓ Firewall rules  \n✓ Regular updates  \n\n---\n\n## 9. Compliance Monitoring\n\n### 9.1 StoreMind's Role\n\nStoreMind does NOT:\n- Audit customer database\n- Monitor customer access control\n- Verify customer compliance\n- Collect customer logs\n\nStoreMind CAN:\n- Provide technical support\n- Supply compliance checklist\n- Offer best practice guidance\n\n### 9.2 Customer's Role\n\nCustomer responsible for:\n\n✓ Regular internal audit (GDPR/KVKK)  \n✓ Penetration testing (annual)  \n✓ Access control review (quarterly)  \n✓ Incident response plan (written)  \n✓ Staff training (annual)  \n\n---\n\n## 10. Liability & Indemnification\n\n### 10.1 Limited Liability\n\nStoreMind has **ZERO liability** because:\n\n```\nStoreMind stores NO data\nStoreMind processes NO data in cloud\nStoreMind has NO access to customer data\nStoreMind transfers NO data to third parties\n\nResult: StoreMind cannot be liable for:\n- Data misuse (never happened)\n- Data breach (never stored)\n- Data transfer risk (never transferred)\n- Regulatory violation (customer's jurisdiction)\n```\n\n### 10.2 Rare Exceptions\n\nStoreMind IS liable ONLY if:\n\n```\nStoreMind intentionally sends data to cloud\nStoreMind intentionally collects telemetry and sells it\nStoreMind intentionally opens a backdoor\nStoreMind intentionally steals encryption key\n\n(None of these will happen — code review prevents it)\n```\n\n---\n\n## 11. Term & Termination\n\n### 11.1 Validity\n\nThis DPA:\n- Starts: When customer begins using StoreMind\n- Ends: When customer stops using StoreMind\n- Default: This agreement applies (no other written agreement)\n\n### 11.2 Termination\n\nWhen customer stops using StoreMind:\n\n```\n1. All data belongs to customer (was always customer's)\n2. StoreMind retains nothing (never held any)\n3. Customer can delete / transfer data\n4. DPA automatically ends\n```\n\n---\n\n## 12. Additional Obligations\n\n### 12.1 Data Subject Rights\n\n**Access Request (Subject Access Request)**\n\n```\nPerson: \"What data do you have about me?\"\nCustomer: Query database → export → provide\nStoreMind: Supports (technical guidance)\n```\n\n**Deletion Request (Right to Erasure)**\n\n```\nPerson: \"Delete me\"\nCustomer: DELETE from database → execute → confirm\nStoreMind: Provides deletion tools\n```\n\n**Export Request (Data Portability)**\n\n```\nPerson: \"Export my data\"\nCustomer: CSV/JSON export → provide to person\nStoreMind: Provides export mechanisms\n```\n\n### 12.2 Correction Request (Rectification)\n\n```\nPerson: \"My data is wrong\"\nCustomer: UPDATE in database → confirm\nStoreMind: Maintains audit trail\n```\n\n---\n\n## 13. Signature & Acceptance\n\nBy downloading or using StoreMind software, customer:\n\n```\n☑ Understands all obligations\n☑ Accepts all responsibility\n☑ Understands GDPR/KVKK compliance is customer's duty\n☑ Understands StoreMind stores no data\n☑ Understands technical support is available\n```\n\n---\n\n## 14. Contact\n\nQuestions about this DPA?\n\n- **dpa@storemind.ai**\n- **legal@storemind.ai**\n- **compliance@storemind.ai**\n\n---\n\n**Last Updated**: June 2026  \n**Version**: 1.0  \n**Status**: In Effect"};
var SUB={tr:"Veri İşleme Sözleşmesi",en:"Data Processing Agreement"};
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function inline(s){s=esc(s);
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  return s;}
function render(md){
  var L=md.split("\n"),out=[],i=0,inUL=false,inCode=false,buf=[],tbl=[];
  function closeUL(){if(inUL){out.push("</ul>");inUL=false;}}
  function flushTbl(){if(!tbl.length)return;
    var rows=tbl.filter(function(r){return!/^\s*\|?[\s:|-]+\|?\s*$/.test(r)});
    out.push("<table>");rows.forEach(function(r,ri){
      var cells=r.replace(/^\||\|$/g,"").split("|").map(function(c){return c.trim();});
      var tag=ri===0?"th":"td";out.push("<tr>"+cells.map(function(c){return"<"+tag+">"+inline(c)+"</"+tag+">";}).join("")+"</tr>");
    });out.push("</table>");tbl=[];}
  for(i=0;i<L.length;i++){var ln=L[i];
    if(/^```/.test(ln)){if(inCode){out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");buf=[];inCode=false;}else{closeUL();flushTbl();inCode=true;}continue;}
    if(inCode){buf.push(ln);continue;}
    if(/^\s*\|.*\|\s*$/.test(ln)){closeUL();tbl.push(ln);continue;} else flushTbl();
    if(/^\s*$/.test(ln)){closeUL();continue;}
    var h=ln.match(/^(#{1,4})\s+(.*)$/);
    if(h){closeUL();out.push("<h"+h[1].length+">"+inline(h[2])+"</h"+h[1].length+">");continue;}
    if(/^---+$/.test(ln)){closeUL();out.push("<hr>");continue;}
    if(/^>\s?/.test(ln)){closeUL();out.push("<blockquote>"+inline(ln.replace(/^>\s?/,""))+"</blockquote>");continue;}
    var li=ln.match(/^\s*[-*]\s+(.*)$/);
    if(li){if(!inUL){out.push("<ul>");inUL=true;}
      var t=li[1],cls="";
      if(/^✓/.test(t)){cls=" class='y'";t=t.replace(/^✓\s*/,"");}
      else if(/^[❌✕✗]/.test(t)){cls=" class='n'";t=t.replace(/^[❌✕✗]\s*/,"");}
      out.push("<li"+cls+">"+inline(t)+"</li>");continue;}
    closeUL();out.push("<p>"+inline(ln)+"</p>");
  }
  closeUL();flushTbl();return out.join("\n");
}
