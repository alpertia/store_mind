var DOCS={tr:"# StoreMind Gizlilik Politikası\n\n## Temel İlke: \"Sizin Orada Olduğunuzu Sadece O Mağaza Bilir\"\n\nMüşteri dün saat 14:32'de mağazaya girdi.  \nKamerayla tanındı. Lokal database'e kaydı.\n\n**Kim biliyor?**\n\n- ✓ Mağaza (local device'da, encrypted)\n- ❌ StoreMind (hiçbir veri tutmuyoruz)\n- ❌ Cloud sağlayıcı (hiçbir API call yok)\n- ❌ Analytics şirketi (veri transfer yok)\n- ❌ Hacker (bulut yoksa hack edilecek ne var?)\n- ❌ Başka hiç kimse\n\n---\n\n## StoreMind = Store Çalışanının Mükemmel Belleği\n\nHayal edin: Mağazanızda 10 yıldan beri çalışan bir güvenlik görevlisi var.\n\n**Müşteri gelir:**\n- Güvenlik: \"Seni daha önce görmüştüm. 3 aylar önce, saat 16:00'de geldin.\"\n- Müşteri: \"Evet doğru!\"\n\n**Soru: Kim biliyor bu bilgiyi?**\n- Sadece güvenlik (ve mağaza sahibi)\n- Başka kimse değil\n\nGüvenlik görevlisinin:\n- ✓ Hatırlaması var\n- ✓ Hırsız değil (müşteriyi satar mı?)\n- ✓ Tartışmaz (başkasına anlatmaz)\n\n**StoreMind = o güvenlik görevlisinin şifreli veri haline gelmesi**\n\nAma daha iyi:\n- ✓ Hiçbir zaman hataya düşmez\n- ✓ Asla unutmaz (ya da sıfırlar)\n- ✓ Hiçbir zaman başkasına söylemez (architecture'ı bağlayan)\n- ✓ 24/7 çalışır\n- ✓ Hiçbir cloud sağlayıcısı yoktur\n\n---\n\n## Cloud Theater vs. Local Architecture\n\n**Cloud Platformu:**\n```\nMüşteri Mağazada\n    ↓\nKamera → Cloud API → Bulut Sunucu → Analytics → Vendor Logs → Hacker?\n                ↓\n         (Data crosses boundary)\n         ↓\n    Soru: \"GDPR uyumlu musunuz?\" \n    Cevap: \"Evet, badges var, compliance docs var\"\n         ↓\n    Hakikat: Veri hala riskli, hala çok yerde\n```\n\n**StoreMind (Local):**\n```\nMüşteri Mağazada\n    ↓\nKamera → Local GPU → Encrypted Database (Mağazada)\n                ↓\n    Soru: \"GDPR uyumlu musunuz?\"\n    Cevap: \"Uyumlu değiliz, fizikten uyumlu: veri hiç çıkmıyor\"\n         ↓\n    Hakikat: Veri sadece mağazada, şifreli, safe\n```\n\n---\n\n## Neden Diğerleri Cloud'da Yapar?\n\nÇünkü **ucuzdur**, kolaydur, hızlı develop edilir.\n\nStoreMind niye **Lokal** yapar?\n\nÇünkü **doğrudur**. Sizin mağazanız = sizin veri sınırı.\n\nFark:\n\n| Aspect | Cloud Platforms | StoreMind |\n|--------|-----------------|-----------|\n| **Processing** | Remote servers (vendor's responsibility) | Your hardware (your control) |\n| **Security** | Multiple cloud layers, API calls | Local only, no network exposure |\n| **Compliance** | Vendor's GDPR compliance + your compliance | Your infrastructure, your responsibility |\n| **Speed** | Network latency (300-1000ms) | Local processing (10-50ms) |\n| **Cost** | Cloud API bills every month | One-time software license |\n| **Ownership** | Vendor controls your data | You own everything |\n\n**Sonuç**: StoreMind sadece uyumlu değil. Mimarı daha iyi.\n\n---\n\n## Veri İşleme Akışı\n\n```\nMağaza Kameraları\n    ↓\nLokal Edge Device (GPU/CPU sizde)\n    ↓\nYüz Tanıma / Araç Plakası / Raf Saymı (İŞTE BURADA)\n    ↓\nLokal Veritabanı (Şifreli)\n    ↓\nBitti. Buluta çıkmadı.\n```\n\n---\n\n## Bulut Yok. Asla.\n\nStoreMind hiçbir zaman:\n- ❌ Video ya da görüntü buluta göndermez\n- ❌ Metadata buluta göndermez\n- ❌ Cloud API'lerini işleme için çağırmaz\n- ❌ Veri analizi bulutta yapmaz\n- ❌ Müşteri bilgisini profillemez\n- ❌ Başka şirketlerle veri paylaşmaz\n\nHiç. Asla. Net.\n\n---\n\n## KVKK / GDPR Sorumluluğu\n\n**Bu açık olmalı**: StoreMind veri işler **sizin altyapınızda**.\n\n### StoreMind'ın Rolü (Veri İşleme Hizmetçi)\n\nStoreMind, **yazılım koddur**. Başka hiçbir şey değil.\n- Sunucu yönetmiyoruz ✓\n- Veri yedeklemiyor ✓\n- Veri analiz etmiyor ✓\n- Veri saklamıyor ✓\n\n**Sizin veri işleme altyapınızı kontrol ediyorsunuz.**\n\n### Sizin Sorumluluğunuz (Veri Denetleyen)\n\nMağaza işletecekseniz, siz şunlardan sorumlusunuz:\n\n1. **Biyometrik Veri Rızası** (KVKK Madde 6, GDPR Article 9)\n   - Yüz tanıma yapıyorsanız → çalışanlara yazılı izin almalısınız\n   - Müşteri tanıması yapıyorsanız → müşteri rızası gerekli\n   - **StoreMind bunu yapmıyor. Siz yapmalısınız.**\n\n2. **Uyarı Levhaları**\n   - \"Bu işyerinde yüz tanıma sistemi vardır\"\n   - \"Bu işyerinde araç plakası tanıması yapılır\"\n   - Mağaza girişine yapıştırmalısınız\n\n3. **Veri Kişisinin Hakları**\n   - Müşteri yüzünü sil: veritabanınızdan silebilmelisiniz\n   - Müşteri veri nerede sordu: veritabanınıza bakıp söylemelisiiniz\n   - Müşteri ihraç talep etti: JSON dosyasını yaratıp vermelisiiniz\n\n4. **Veri Saklama Politikası**\n   - Ne kadar tutuluyor? (30 gün, 90 gün, 1 yıl?)\n   - Otomatik silme yapılıyor mu?\n   - **Sizin karar.**\n\n5. **Erişim Kontrolü**\n   - Kim görüyor? (Müdür, güvenlik, herkes?)\n   - Şifre güvenliği var mı?\n   - **Sizin sorumluluk.**\n\n6. **İhlal Bildirimi**\n   - Veri sızarsa → Gözlemci Kurulu'na 72 saat içinde (KVKK)\n   - Gözlemci Kurulu'na bildirmelisiiniz, biz değil\n\n---\n\n## Biyometrik Veri (Yüz Tanıma) — Özel Dikkat\n\nYüz verisi **en hassas veridir** (GDPR/KVKK'da).\n\n### StoreMind'ın Teknikleri:\n\n- **Yüz Algılama**: \"Bu görüntüde insan yüzü var mı?\" → işlenir lokal\n- **Yüz Özelliği Çıkarması**: \"Yüz vektörü nedir?\" → lokal\n- **Eşleştirme**: \"Daha önce gördük mü?\" → lokal database'de aranır\n- **Sonuç**: matched / maybe / silent (lokal)\n\n### Hiçbir Zaman:\n\n- ❌ Yüz kare (crop) kaydedilmez\n- ❌ Ham görüntü kaydedilmez\n- ❌ Buluta gitmez\n- ❌ 3. taraf ML servisi kullanılmaz\n\n### Sizin Sorumluluğunuz:\n\n```\nYüz tanımak istiyorsan:\n↓\nYazılı izin al (çalışan, müşteri)\n↓\nUyarı levhası koy\n↓\nSilme hakkını sağla (veritabanından silebilsin)\n↓\nSaklama süresi sınırla (30 gün, 90 gün, etc.)\n↓\nŞifreli tut (StoreMind tarafından sağlanır)\n↓\nO zaman kullan.\n```\n\n---\n\n## Veri Sahibi Hakları\n\nMüşteri veya çalışan sorduysa:\n\n### \"Benim verilerim nerde?\"\n**Cevap**: \"Mağazamızın veritabanında, şifreli.\"\n\n### \"Benim verilerimide sil\"\n**Yapman lazım**: Veritabanınızdan silebilmek gerekir.\n- StoreMind, silme özelliğini sağlar\n- Siz tıklatırsınız\n- Verisi silinir\n\n### \"Verilerimden export et\"\n**Yapman lazım**: \n- Veritabanınızdan CSV/JSON çıkartırsınız\n- Müşteriye verirsiniz\n\n### \"Kimse görmemeliydim\"\n**Mağaza müdürü sorumlu**: \n- Erişim kontrolü sizde\n- Şifre kimde?\n- Kim veritabanına bağlanabiliyor?\n\n---\n\n## StoreMind'ın Garantileri\n\n✓ **Lokal İşleme**: Tüm ML/AI işlemleri cihaz üzerinde  \n✓ **Şifreli Depolama**: AES-256, sizin anahtarınız  \n✓ **Offline Çalışma**: İnternet kesilse de çalışıyor  \n✓ **Veri Kaçış Yok**: Buluta API çağrısı hiçbir zaman  \n✓ **Açık Kaynak Seçenekleri**: Kendi kurabilirsiniz  \n\n---\n\n## StoreMind Hiçbir Şey Yapmıyor\n\nBunu açık konuşmak gerekir:\n\n- StoreMind veri **toplamıyor**\n- StoreMind veri **satmıyor**\n- StoreMind veri **yedeklemiyor**\n- StoreMind veri **analiz etmiyor**\n- StoreMind profillemesine **katılmıyor**\n\n**StoreMind = yazılım.**\n**Veri = sizin.**\n\n---\n\n## Opsiyonel Bulut Entegrasyonu\n\nSiz **kendi kararınızla** bulut bağlayabilirsiniz:\n\n- Supabase analytics? Bağla, ama **senin seçimin**\n- AWS S3 backup? Bağla, **ama senin seçimin**\n- Google BigQuery? Bağla, **senin seçimin**\n\nStoreMind bunu **reddetmez, ama zorlama yapmaz.**\n\nBu durumda:\n- StoreMind = yerel işleme (uyumlu)\n- Bulut servisi = müşterinin seçimi (müşterinin GDPR sorumluluğu)\n\n---\n\n## Özet: Sorumluluğun Sınırı\n\n| Görev | Kimin? |\n|-------|---------|\n| Lokal işleme teknolojisi sağlamak | StoreMind ✓ |\n| Yüz tanıma rızası almak | **Siz** |\n| Uyarı levhasını koymak | **Siz** |\n| Veritabanını şifreli tutmak | **Siz** |\n| Silme hakkını sağlamak | **Siz** |\n| Erişim kontrolü yapmak | **Siz** |\n| İhlal bildirmek | **Siz** |\n| Veri saklama süresi kararı | **Siz** |\n\nStoreMind sadece **lokal işleme altyapısı sağlar.**\n\n---\n\n## İletişim\n\nHerhangi bir soru?\n\n- **Gizlilik sorunu**: contact@storemind.ai\n- **GDPR başvurusu**: gdpr@storemind.ai (müşteri temsilcim vardır)\n- **İhlal bildirimi**: security@storemind.ai (hemen araştırıyoruz)\n\n---\n\n**Son Güncelleme**: Haziran 2026  \n**Geçerli**: Türkiye (KVKK), AB (GDPR), Global",en:"# StoreMind Privacy Policy\n\n## Core Principle: \"Your Store Knows You Were Here. Nobody Else.\"\n\nA customer visited your store yesterday at 2:32 PM.  \nThe camera recognized them. Data was stored locally.\n\n**Who knows?**\n\n- ✓ Your store (on local device, encrypted)\n- ❌ StoreMind (we don't store anything)\n- ❌ Cloud provider (no API calls ever)\n- ❌ Analytics company (no data transfer)\n- ❌ Hacker (no cloud to breach)\n- ❌ Anybody else\n\n---\n\n## StoreMind = Your Store's Perfect Memory\n\nImagine a security guard at your store for 10 years.\n\n**Customer comes in:**\n- Guard: \"I remember you. You were here 3 months ago at 4 PM.\"\n- Customer: \"Yes, that's right!\"\n\n**Who knows this information?**\n- Only the guard (and store owner)\n- Nobody else\n\nThat guard has:\n- ✓ Memory\n- ✓ Integrity (won't sell your info)\n- ✓ Discretion (never tells anyone)\n\n**StoreMind = that guard's perfect, encrypted memory**\n\nBut better:\n- ✓ Never forgets, never makes mistakes\n- ✓ Can be deleted on demand\n- ✓ Never tells anyone (architecture guarantees it)\n- ✓ Works 24/7\n- ✓ No cloud provider exists to breach it\n\n---\n\n## Cloud Theater vs. Local Architecture\n\n**Cloud Platform:**\n```\nCustomer in Store\n    ↓\nCamera → Cloud API → Cloud Server → Analytics → Vendor Logs → Hacker?\n           ↓\n    (Data crosses boundary)\n    ↓\nQuestion: \"Are you GDPR compliant?\"\nAnswer: \"Yes, we have badges, compliance docs\"\n    ↓\nReality: Data still at risk, in multiple places\n```\n\n**StoreMind (Local):**\n```\nCustomer in Store\n    ↓\nCamera → Local GPU → Encrypted Database (Your Store)\n            ↓\nQuestion: \"Are you GDPR compliant?\"\nAnswer: \"We don't need badges. Data never leaves.\"\n    ↓\nReality: Data only in your store, encrypted, safe\n```\n\n---\n\n## Why Others Use Cloud\n\nBecause it's **cheaper**, easier, faster to build.\n\nWhy StoreMind Uses Local?\n\nBecause it's **the right way**. Your store = your data boundary.\n\n---\n\n## Why This Matters\n\nOther retail platforms process in the cloud because it's **cheaper to build**.  \nStoreMind processes locally because it's **the right way to build**.\n\nThe difference:\n\n| Aspect | Cloud Platforms | StoreMind |\n|--------|-----------------|-----------|\n| **Processing** | Remote vendor servers | Your local hardware |\n| **Security** | Multiple cloud layers, APIs | Local only, no network exposure |\n| **Compliance** | Vendor's GDPR + your compliance | Your infrastructure, your responsibility |\n| **Speed** | Network latency (300-1000ms) | Instant local (10-50ms) |\n| **Cost** | Monthly cloud API bills | One-time software |\n| **Ownership** | Vendor controls access | You own everything |\n\n**Result**: StoreMind isn't just compliant. It's better engineered.\n\n---\n\n## Data Processing Flow\n\n```\nStore Cameras\n    ↓\nLocal Edge Device (GPU/CPU on your hardware)\n    ↓\nFace Recognition / Plate Detection / Shelf Counting (HAPPENS HERE)\n    ↓\nLocal Database (Encrypted)\n    ↓\nDone. Never left your facility.\n```\n\n---\n\n## No Cloud. Ever.\n\nStoreMind never:\n- ❌ Sends video or images to the cloud\n- ❌ Sends metadata to the cloud\n- ❌ Calls cloud APIs for processing\n- ❌ Analyzes data remotely\n- ❌ Profiles customers\n- ❌ Shares data with third parties\n\nNever. Ever. Period.\n\n---\n\n## GDPR / KVKK Responsibility\n\nThis must be clear: StoreMind processes data **on your infrastructure**.\n\n### StoreMind's Role (Data Processor)\n\nStoreMind is **software code**. Nothing more.\n- We don't manage servers ✓\n- We don't back up data ✓\n- We don't analyze data ✓\n- We don't store data ✓\n\n**You control your data processing infrastructure.**\n\n### Your Responsibility (Data Controller)\n\nIf you operate a store, you're responsible for:\n\n1. **Biometric Data Consent** (KVKK Article 6, GDPR Article 9)\n   - Using face recognition? → Get written consent from employees/customers\n   - Identifying customers? → Customer consent required\n   - **StoreMind doesn't do this. You must.**\n\n2. **Privacy Notices**\n   - \"Face recognition is used in this facility\"\n   - \"Vehicle plate recognition is active\"\n   - Post at facility entrance\n\n3. **Data Subject Rights**\n   - Customer wants face deleted? → You delete from database\n   - Customer asks where data is? → You check database, you respond\n   - Customer requests export? → You generate CSV, you provide it\n\n4. **Data Retention Policy**\n   - How long do you keep it? (30 days, 90 days, 1 year?)\n   - Does it auto-delete?\n   - **Your decision.**\n\n5. **Access Control**\n   - Who can access the database? (Manager, security, everyone?)\n   - Password security?\n   - **Your responsibility.**\n\n6. **Breach Notification**\n   - If data leaks → Report to regulator within 72 hours (GDPR/KVKK)\n   - **You notify the regulator. Not us.**\n\n---\n\n## Biometric Data (Face Recognition) — Special Attention\n\nFace data is **the most sensitive** under GDPR/KVKK.\n\n### What StoreMind Does:\n\n- **Face Detection**: \"Is there a face in this image?\" → processed locally\n- **Face Feature Extraction**: \"What are the face vectors?\" → local\n- **Matching**: \"Have we seen this face before?\" → local database lookup\n- **Result**: matched / maybe / silent (all local)\n\n### What StoreMind Never Does:\n\n- ❌ Stores face crops (images)\n- ❌ Stores raw footage\n- ❌ Sends anything to cloud\n- ❌ Uses third-party ML services\n\n### Your Responsibility:\n\n```\nWant to use face recognition?\n↓\nGet written consent (employees, customers)\n↓\nPost privacy notice\n↓\nEnable deletion rights (people can be removed from database)\n↓\nSet retention limit (30 days, 90 days, etc.)\n↓\nKeep data encrypted (StoreMind provides framework)\n↓\nThen you can use it.\n```\n\n---\n\n## Data Subject Rights\n\nIf a customer or employee asks:\n\n### \"Where is my data?\"\n**You respond**: \"In our store database, encrypted locally.\"\n\n### \"Delete my data\"\n**You must**: Delete from your database.\n- StoreMind provides deletion tools\n- You execute it\n- Data is gone\n\n### \"Export my data\"\n**You must**:\n- Export from your database (CSV/JSON)\n- Provide to the person\n\n### \"I shouldn't have been tracked\"\n**You're responsible**:\n- Access control is yours\n- Password management is yours\n- Who can access the database is yours\n\n---\n\n## StoreMind's Guarantees\n\n✓ **Local Processing Only**: All ML/AI runs on your hardware  \n✓ **Encrypted Storage**: AES-256, your keys  \n✓ **Offline Capable**: Works without internet  \n✓ **Zero Data Leakage**: No cloud API calls ever  \n✓ **Open Source Options**: Deploy yourself if you want  \n\n---\n\n## What StoreMind Does NOT Do\n\nThis needs to be explicit:\n\n- StoreMind does NOT collect data\n- StoreMind does NOT sell data\n- StoreMind does NOT back up data\n- StoreMind does NOT analyze data\n- StoreMind does NOT profile people\n\n**StoreMind = software.**\n**Data = yours.**\n\n---\n\n## Optional Cloud Integration\n\nYou can **choose** to connect cloud services:\n\n- Want Supabase analytics? Connect it. **Your choice.**\n- Want AWS S3 backup? Connect it. **Your choice.**\n- Want BigQuery analysis? Connect it. **Your choice.**\n\nStoreMind doesn't **prevent** cloud integration, but it doesn't **force** it either.\n\nIf you do connect cloud:\n- StoreMind = local processing (compliant)\n- Your cloud choice = your GDPR responsibility\n\n---\n\n## Responsibility Boundary\n\n| Task | Who? |\n|------|------|\n| Provide local processing technology | StoreMind ✓ |\n| Obtain face recognition consent | **You** |\n| Post privacy notices | **You** |\n| Keep database encrypted | **You** |\n| Enable deletion rights | **You** |\n| Control database access | **You** |\n| Report breaches | **You** |\n| Define data retention | **You** |\n\nStoreMind only provides **local processing infrastructure**.\n\n---\n\n## Contact\n\nQuestions?\n\n- **Privacy concern**: contact@storemind.ai\n- **GDPR request**: gdpr@storemind.ai (we have a DPA)\n- **Security incident**: security@storemind.ai (we respond immediately)\n\n---\n\n**Last Updated**: June 2026  \n**Valid For**: EU (GDPR), Turkey (KVKK), Global"};

  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  return s;}
function render(md){
  var L=md.split("\n"),out=[],i=0,inUL=false,inCode=false,buf=[],tbl=[];
  function closeUL(){if(inUL){out.push("</ul>");inUL=false;}}
  function flushTbl(){if(!tbl.length)return;
    var rows=tbl.filter(function(r){return!/^\s*\|?[\s:|-]+\|?\s*$/.test(r)});
    out.push("<table>");rows.forEach(function(r,ri){
      var cells=r.replace(/^\||\|$/g,"").split("|").map(function(c){return c.trim();});
      var tag=ri===0?"th":"td";out.push("<tr>"+cells.map(function(c){return"<"+tag+">"+inline(c)+"</"+tag+">";}).join("")+"</tr>");
    });out.push("</table>");tbl=[];}
  for(i=0;i<L.length;i++){var ln=L[i];
    if(/^```/.test(ln)){if(inCode){out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");buf=[];inCode=false;}else{closeUL();flushTbl();inCode=true;}continue;}
    if(inCode){buf.push(ln);continue;}
    if(/^\s*\|.*\|\s*$/.test(ln)){closeUL();tbl.push(ln);continue;} else flushTbl();
    if(/^\s*$/.test(ln)){closeUL();continue;}
    var h=ln.match(/^(#{1,4})\s+(.*)$/);
    if(h){closeUL();out.push("<h"+h[1].length+">"+inline(h[2])+"</h"+h[1].length+">");continue;}
    if(/^---+$/.test(ln)){closeUL();out.push("<hr>");continue;}
    if(/^>\s?/.test(ln)){closeUL();out.push("<blockquote>"+inline(ln.replace(/^>\s?/,""))+"</blockquote>");continue;}
    var li=ln.match(/^\s*[-*]\s+(.*)$/);
    if(li){if(!inUL){out.push("<ul>");inUL=true;}
      var t=li[1],cls="";
      if(/^✓/.test(t)){cls=" class='y'";t=t.replace(/^✓\s*/,"");}
      else if(/^[❌✕✗]/.test(t)){cls=" class='n'";t=t.replace(/^[❌✕✗]\s*/,"");}
      out.push("<li"+cls+">"+inline(t)+"</li>");continue;}
    closeUL();out.push("<p>"+inline(ln)+"</p>");
  }
  closeUL();flushTbl();return out.join("\n");
}
